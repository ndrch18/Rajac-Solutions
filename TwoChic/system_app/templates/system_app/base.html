{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Two Chic Manila</title>

    <!-- Mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap">

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'bootstrap/css/custom.css' %}">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

    <!-- Popper -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

    <!-- Bootstrap 4 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <!-- Header at the top of the page -->
    <nav class="navbar navbar-expand-lg shadow-sm custom-navbar fixed-top">
        <div class="container-fluid d-flex align-items-center">

        <!-- LEFT: Logo + Brand (always visible) -->
            <div class="d-flex align-items-center ms-2">
                <a class="navbar-brand d-flex align-items-center text-dark text-decoration-none"
                    href="{% url 'prodman_homepage' %}">
                    <img src="{% static 'images/logo.png' %}" alt="Logo" width="20" class="me-2">
                </a>

                <a class="d-flex flex-column lh-1 text-dark text-decoration-none"
                    href="{% url 'prodman_homepage' %}">
                    <span class="brand-top">TWO CHIC</span>
                    <span class="brand-bottom">MANILA</span>
                </a>
            </div>

        <!-- RIGHT: Account dropdown (only when logged in) -->
        {% if request.session.account_id %}
            <div class="ms-auto mr-3 dropdown">
                <button class="btn p-0 border-0 bg-transparent text-dark dropdown-toggle"
                    href="#"
                    role="button"
                    data-toggle="dropdown"
                    aria-expanded="false">
                    <span class="material-icons account-icon">account_circle</span>
                </button>

            <div class="dropdown-menu dropdown-menu-left shadow account-card">
                <a class="dropdown-item" href="{% url 'change_password' %}">
                    <span class="material-icons mr-2">lock</span>
                    Change password
                </a>

            <div class="dropdown-divider"></div>

                <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                    <span class="material-icons mr-2">logout</span>
                    Logout
                </a>
            </div>
      </div>
    {% endif %}

  </div>
</nav>
    
    <main class="container my-4 main-content">
    {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>

</body>
</html>
