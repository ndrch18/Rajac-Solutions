{% extends 'system_app/base.html' %}
{% load static %}

{% block content %}
<div class="container text-center mt-4">
    <h5 class="mb-4">Products</h5>

    <div class="row justify-content-center">

        <!-- CREATE ITEM PROFILE CARD -->
        <div class="col-6 col-md-4 mb-4">
            <a href="{% url 'owner_add_product' %}" class="dashboard-card text-dark text-decoration-none">
                <div class="card h-100 shadow-lg">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-4">
                        <div class="dashboard-icon-wrap mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 64 64" fill="none">
                                <!-- document body -->
                                <rect x="10" y="6" width="38" height="50" rx="4" fill="#e8edf2" stroke="#aab5c0" stroke-width="2"/>
                                <!-- lines on document -->
                                <line x1="18" y1="20" x2="42" y2="20" stroke="#aab5c0" stroke-width="2" stroke-linecap="round"/>
                                <line x1="18" y1="28" x2="42" y2="28" stroke="#aab5c0" stroke-width="2" stroke-linecap="round"/>
                                <line x1="18" y1="36" x2="32" y2="36" stroke="#aab5c0" stroke-width="2" stroke-linecap="round"/>
                                <!-- pencil -->
                                <g transform="translate(30,36) rotate(-40)">
                                    <rect x="-4" y="-14" width="8" height="18" rx="2" fill="#F5C842" stroke="#d4a800" stroke-width="1"/>
                                    <polygon points="-4,4 4,4 0,12" fill="#e8c4a0" stroke="#d4a800" stroke-width="1"/>
                                    <rect x="-4" y="-14" width="8" height="4" rx="1" fill="#c0c0c0"/>
                                </g>
                            </svg>
                        </div>
                        <span class="dashboard-label" style="font-size:13px;">Create Item Profile Card</span>
                    </div>
                </div>
            </a>
        </div>

        <!-- PRODUCTS LIST -->
        <div class="col-6 col-md-4 mb-4">
            <a href="{% url 'owner_products_list' %}" class="dashboard-card text-dark text-decoration-none">
                <div class="card h-100 shadow-lg">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-4">
                        <div class="dashboard-icon-wrap mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 64 64" fill="none">
                                <!-- book body -->
                                <rect x="8" y="8" width="36" height="46" rx="3" fill="#C6E8ED" stroke="#7dbdc7" stroke-width="2"/>
                                <!-- spine -->
                                <rect x="8" y="8" width="8" height="46" rx="3" fill="#7dbdc7"/>
                                <!-- magnifying glass -->
                                <circle cx="42" cy="42" r="12" fill="white" stroke="#5a9ea8" stroke-width="2.5"/>
                                <circle cx="42" cy="42" r="6" fill="#C6E8ED" stroke="#5a9ea8" stroke-width="1.5"/>
                                <line x1="51" y1="51" x2="58" y2="58" stroke="#5a9ea8" stroke-width="3" stroke-linecap="round"/>
                                <!-- list lines on book -->
                                <line x1="20" y1="22" x2="38" y2="22" stroke="#7dbdc7" stroke-width="2" stroke-linecap="round"/>
                                <line x1="20" y1="30" x2="38" y2="30" stroke="#7dbdc7" stroke-width="2" stroke-linecap="round"/>
                                <line x1="20" y1="38" x2="32" y2="38" stroke="#7dbdc7" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <span class="dashboard-label">Products List</span>
                    </div>
                </div>
            </a>
        </div>

    </div>
</div>
{% endblock %}
